name: CI/CD - Deploy to Render & Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check configuration
        run: |
          python -c "import config; print('✓ Config loaded successfully')"
          python -c "from ui.app import DictateApp; print('✓ UI app imports successfully')"
          python -c "from audio.processor import AudioProcessor; print('✓ Audio processor imports successfully')"
          python -c "from transcription.whisper_stt import WhisperTranscriber; print('✓ Whisper transcriber imports successfully')"

      - name: Verify build_static.py
        run: |
          python build_static.py
          ls -la dist/
          test -f dist/index.html && echo "✓ Frontend build successful" || exit 1

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        continue-on-error: true

      - name: Log deployment
        run: |
          echo "Backend deployment triggered for Render"
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"

  deploy-frontend:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build frontend
        run: python build_static.py

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production: ${{ github.event.head_commit.message }}'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

  status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [test, deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✓ All deployments completed successfully"
            echo "Backend: Render"
            echo "Frontend: Netlify"
          else
            echo "✗ Deployment encountered issues"
          fi
