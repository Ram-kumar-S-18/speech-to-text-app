# Build configuration
[build]
  publish = "dist"
  command = "python build_static.py"
[build.environment]
PYTHON_VERSION = "3.11"

# Production deployment context
[context.production]
  command = "python build_static.py"
[context.production.environment]
PYTHON_VERSION = "3.11"

# Preview deployments for pull requests
[context.deploy-preview]
  command = "python build_static.py"

# Branch deploys for development
[context.branch-deploy]
  command = "python build_static.py"

# API Redirects - Route transcription requests to Render backend
[[redirects]]
  from = "/x"
  to = "https://speech-to-text-app-5kuv.onrender.com/x"
  status = 200
  force = true
  headers = { Access-Control-Allow-Origin = "*", Access-Control-Allow-Methods = "POST, OPTIONS, GET", Access-Control-Allow-Headers = "Content-Type, Accept" }

# Fallback for single-page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - Allow connections to Render backend
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://speech-to-text-app-5kuv.onrender.com; img-src 'self' data:; media-src 'self' blob:;"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "microphone=(self)"

# Caching headers for static assets
[[headers]]
  for = "/static/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache busting for HTML
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment configuration for Netlify
[env]
  [env.production]
    REACT_APP_API_URL = "https://speech-to-text-app-5kuv.onrender.com"
    REACT_APP_ENVIRONMENT = "production"
  [env.preview]
    REACT_APP_API_URL = "https://speech-to-text-app-5kuv.onrender.com"
    REACT_APP_ENVIRONMENT = "preview"
  [env.development]
    REACT_APP_API_URL = "http://localhost:7865"
    REACT_APP_ENVIRONMENT = "development"

# Function configuration (if using Netlify Functions)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"


