version: "3.9"

services:
  speech-to-text:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speech-to-text-app
    ports:
      - "7865:7865"
    environment:
      - WHISPER_MODEL_SIZE=small
      - PORT=7865
      - HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - WHISPER_CPU_THREADS=4
      - OMP_NUM_THREADS=4
    volumes:
      - whisper_cache:/root/.cache
      - ./tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7865').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  whisper_cache:
    driver: local
